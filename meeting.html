<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бой принят! ⚔️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background: #0a0a0a;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 40%, rgba(200,30,20,0.3) 0%, transparent 50%),
                radial-gradient(circle at 30% 70%, rgba(255,100,30,0.2) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(180,20,10,0.25) 0%, transparent 50%),
                #0a0a0a;
            z-index: 0;
        }
        .grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,60,20,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,60,20,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }
        /* Искры */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ff4020;
            border-radius: 50%;
            animation: flyUp 2s ease-out forwards;
            box-shadow: 0 0 8px #ff4020;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }
        .container {
            background: #111;
            border-radius: 4px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
            text-align: center;
            border: 2px solid #2a0808;
            box-shadow: 
                0 0 0 3px #1a1a1a,
                0 0 0 6px #1a0505,
                0 0 0 7px #8b1a10,
                0 20px 50px rgba(0,0,0,0.7),
                0 0 100px rgba(255,50,20,0.4);
            animation: cardIn 0.6s ease-out;
        }
        @keyframes cardIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #ff4020;
            border-style: solid;
        }
        .corner-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .corner-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
        .shield {
            font-size: 65px;
            display: inline-block;
            animation: shieldBounce 0.7s ease-out;
            filter: drop-shadow(0 0 25px #ff4020);
        }
        @keyframes shieldBounce {
            0% { transform: scale(0) rotate(-30deg); }
            60% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }
        .title {
            color: #ddd;
            font-size: 2em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 20px 0 10px;
        }
        .title .red {
            color: #ff4020;
            text-shadow: 0 0 25px rgba(255,64,32,0.7);
        }
        .time-box {
            color: #ff9060;
            font-size: 1.2em;
            margin: 20px 0;
            padding: 15px 25px;
            background: rgba(255,64,32,0.08);
            border: 1px solid rgba(255,64,32,0.3);
            display: inline-block;
            letter-spacing: 1px;
        }
        .status {
            color: #5f5;
            font-size: 0.9em;
            margin-top: 25px;
            padding: 10px 20px;
            background: rgba(0,255,80,0.05);
            border: 1px solid rgba(0,255,80,0.2);
            display: inline-block;
        }
        .btn-manual {
            display: none;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #b02018;
            color: #fff;
            border: 1px solid #ff4020;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-manual:active {
            transform: scale(0.97);
        }
        .decor {
            margin-top: 25px;
            font-size: 22px;
            letter-spacing: 10px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="shield">⚔️</div>
        <div class="title"><span class="red">Дядя Леон</span>, до встречи!</div>
        <div class="time-box" id="timeDisplay"></div>
        <div class="status" id="status">✅ Племянник получил сигнал!</div>
        <button class="btn-manual" id="manualBtn">📩 Отправить ещё раз</button>
        <div class="decor">🛡️ ⚡ 🗡️</div>
    </div>

    <form id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST" style="display:none;">
        <input type="hidden" name="_subject" value="⚔️ Дядя Леон выбрал время для Доты!">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>
    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <script>
        // Искры
        function spawnParticles() {
            const c = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (30 + Math.random() * 40) + '%';
                p.style.top = (50 + Math.random() * 40) + '%';
                p.style.animationDelay = Math.random() * 1 + 's';
                p.style.animationDuration = (1 + Math.random() * 2) + 's';
                c.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
        }
        spawnParticles();
        setInterval(spawnParticles, 3000);

        // Отправка
        (function() {
            const params = new URLSearchParams(window.location.search);
            const time = params.get('time');
            const timeDisplay = document.getElementById('timeDisplay');
            const status = document.getElementById('status');
            const manualBtn = document.getElementById('manualBtn');
            const form = document.getElementById('emailForm');

            if (!time) {
                timeDisplay.textContent = '⚡ Время не выбрано';
                return;
            }

            const decoded = decodeURIComponent(time);
            timeDisplay.textContent = '🕐 ' + decoded;

            document.getElementById('formTime').value = decoded;
            document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
            document.getElementById('formMessage').value = '⚔️ Дядя Леон выбрал время для Доты: "' + decoded + '"';

            form.target = 'hiddenFrame';
            let sent = false;

            function send() {
                if (sent) return;
                sent = true;
                form.submit();
                status.textContent = '✅ Отправлено!';
                manualBtn.style.display = 'none';
                try {
                    const arr = JSON.parse(localStorage.getItem('dotaTimes') || '[]');
                    arr.push({ time: decoded, date: new Date().toLocaleString('ru-RU') });
                    localStorage.setItem('dotaTimes', JSON.stringify(arr));
                } catch(e) {}
            }

            setTimeout(() => {
                send();
                setTimeout(() => {
                    if (!sent) {
                        status.textContent = '⚠️ Не отправилось';
                        manualBtn.style.display = 'block';
                    }
                }, 3000);
            }, 500);

            manualBtn.addEventListener('click', send);
        })();
    </script>
</body>
</html>
