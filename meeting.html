<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>До встречи в Доте!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(255, 100, 50, 0.3);
            border: 2px solid #ff6432;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,100,50,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .dota-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,100,50,0.8));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .meeting-text {
            color: white;
            font-size: 2.5em;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,100,50,0.6);
        }

        .heart-container {
            font-size: 100px;
            animation: heartBeat 1.5s ease-in-out infinite;
            margin: 30px 0;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .chosen-time {
            color: #ffaa88;
            font-size: 1.3em;
            margin: 15px 0;
        }

        .email-sent {
            color: #00ff64;
            font-size: 1em;
            margin-top: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="dota-logo">⚔️🛡️</div>
            <div class="meeting-text">До встречи!</div>
            <div class="heart-container">❤️</div>
            <div class="chosen-time" id="chosenTimeDisplay"></div>
            <div class="email-sent">
                ✅ Уведомление отправлено племяннику!
            </div>
        </div>
    </div>

    <!-- Скрытая форма для отправки -->
    <form id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST" style="display:none;">
        <input type="hidden" name="_subject" value="🎮 Дядя Леон выбрал время для Доты!">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <script>
        // Получаем время из URL
        const urlParams = new URLSearchParams(window.location.search);
        const timeFromUrl = urlParams.get('time');
        
        if (timeFromUrl) {
            const decodedTime = decodeURIComponent(timeFromUrl);
            document.getElementById('chosenTimeDisplay').textContent = `🕐 ${decodedTime}`;
            
            // Отправляем письмо
            document.getElementById('formTime').value = decodedTime;
            document.getElementById('formDate').value = new Date().toLocaleString('ru-RU');
            document.getElementById('formMessage').value = `Дядя Леон выбрал время: "${decodedTime}"`;
            
            const form = document.getElementById('emailForm');
            form.target = 'hiddenFrame';
            form.submit();
            
            console.log('✅ Письмо отправлено на oleg.zanedelev@gmail.com');
        } else {
            document.getElementById('chosenTimeDisplay').textContent = '🕐 Время не указано';
        }
    </script>
</body>
</html>
