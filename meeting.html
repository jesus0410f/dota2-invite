<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва принята! ⚔️</title>
    <style>
        :root {
            --dota-red: #ff3d00;
            --dota-orange: #ff6d00;
            --dota-gold: #ffab00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 15px;
            background: #050510;
            overflow: hidden;
        }

        .storm-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 50% 30%, rgba(255, 61, 0, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 171, 0, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, #050510 0%, #0a0a20 50%, #0d0d1a 100%);
            animation: bgPulse 3s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        /* Молнии */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bolt {
            position: absolute;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.95) 0%, 
                rgba(255,200,100,0.7) 50%, 
                transparent 100%);
            width: 3px;
            animation: strike 0.15s ease-out forwards;
            opacity: 0;
            filter: blur(1px);
            box-shadow: 0 0 20px rgba(255, 200, 100, 0.8);
        }

        @keyframes strike {
            0% { opacity: 1; transform: scaleY(0); transform-origin: top; }
            100% { opacity: 0; transform: scaleY(1); transform-origin: top; }
        }

        /* Искры */
        .sparks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .spark {
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--color);
            border-radius: 50%;
            animation: sparkBurst 1s ease-out forwards;
            box-shadow: 0 0 10px var(--color);
        }

        @keyframes sparkBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Руны победы */
        .victory-runes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .victory-rune {
            position: absolute;
            font-size: 40px;
            animation: victoryFloat var(--dur) ease-out forwards;
            animation-delay: var(--del);
            opacity: 0;
            filter: drop-shadow(0 0 15px var(--glow));
        }

        @keyframes victoryFloat {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1.5);
            }
            100% {
                transform: translateY(-200px) scale(0.5);
                opacity: 0;
            }
        }

        .container {
            background: rgba(10, 10, 25, 0.9);
            border-radius: 25px;
            padding: 40px 25px;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 61, 0, 0.5);
            box-shadow: 
                0 0 50px rgba(255, 61, 0, 0.4),
                0 0 100px rgba(255, 109, 0, 0.2),
                0 20px 60px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            text-align: center;
            animation: cardDrop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardDrop {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(-50px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .border-glow {
            position: absolute;
            inset: -3px;
            border-radius: 28px;
            padding: 3px;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(255, 61, 0, 0.8),
                rgba(255, 171, 0, 0.8),
                rgba(255, 61, 0, 0.8),
                transparent
            );
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderFastSpin 3s linear infinite;
            pointer-events: none;
        }

        @keyframes borderFastSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .swords {
            font-size: 70px;
            display: inline-block;
            animation: swordsClash 0.6s ease-out, swordsFloat 2s ease-in-out 0.6s infinite;
            filter: drop-shadow(0 0 30px rgba(255, 61, 0, 0.8));
        }

        @keyframes swordsClash {
            0% { transform: scale(0) rotate(-180deg); }
            50% { transform: scale(1.4) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes swordsFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .victory-text {
            font-size: 2.5em;
            font-weight: 900;
            margin: 20px 0;
            background: linear-gradient(to right, #ff3d00, #ff6d00, #ffab00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }

        .chosen-time {
            color: #ffab00;
            font-size: 1.3em;
            margin: 15px 0;
            padding: 15px 25px;
            background: rgba(255, 61, 0, 0.1);
            border-radius: 15px;
            display: inline-block;
            border: 1px solid rgba(255, 61, 0, 0.3);
            animation: fadeUp 0.6s ease-out 0.4s both;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .email-status {
            color: #00ff64;
            font-size: 1em;
            margin-top: 25px;
            padding: 12px 20px;
            background: rgba(0, 255, 100, 0.1);
            border-radius: 12px;
            display: inline-block;
            border: 1px solid rgba(0, 255, 100, 0.3);
            animation: fadeUp 0.6s ease-out 0.6s both;
        }

        .manual-btn {
            display: none;
            background: linear-gradient(135deg, #ff3d00, #ff6d00);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 15px;
            font-size: 1.1em;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 30px rgba(255, 61, 0, 0.5);
            transition: all 0.3s ease;
        }

        .manual-btn:active {
            transform: scale(0.95);
        }

        .decor {
            font-size: 28px;
            margin-top: 20px;
            opacity: 0.6;
            letter-spacing: 12px;
        }

        .decor span {
            display: inline-block;
            animation: decorFloat 3s ease-in-out infinite;
        }
        .decor span:nth-child(2) { animation-delay: 0.4s; }
        .decor span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes decorFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="storm-bg"></div>
    <div class="lightning" id="lightning"></div>
    <div class="sparks" id="sparks"></div>
    <div class="victory-runes" id="victoryRunes"></div>

    <div class="container">
        <div class="border-glow"></div>
        <div class="content">
            <div class="swords">⚔️</div>
            <div class="victory-text">Битва принята!</div>
            <div class="chosen-time" id="chosenTimeDisplay"></div>
            <div class="email-status" id="emailStatus">
                ✅ Племянник уже получил сигнал!
            </div>
            <button class="manual-btn" id="manualSendBtn">
                📩 Отправить ещё раз
            </button>
            <div class="decor">
                <span>🛡️</span>
                <span>💀</span>
                <span>🗡️</span>
            </div>
        </div>
    </div>

    <form id="emailForm" action="https://formsubmit.co/oleg.zanedelev@gmail.com" method="POST" style="display:none;">
        <input type="hidden" name="_subject" value="⚔️ Дядя Лёня выбрал время для Доты!">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="time" id="formTime">
        <input type="text" name="date" id="formDate">
        <input type="text" name="message" id="formMessage">
    </form>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <script>
        // Эпичные молнии
        function createLightning() {
            const container = document.getElementById('lightning');
            const bolt = document.createElement('div');
            bolt.className = 'bolt';
            bolt.style.left = Math.random() * 100 + '%';
            bolt.style.top = Math.random() * 50 + '%';
            bolt.style.height = (Math.random() * 200 + 80) + 'px';
            bolt.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
            container.appendChild(bolt);
            setTimeout(() => bolt.remove(), 200);
        }

        // Искры из центра
        function burstSparks() {
            const container = document.getElementById('sparks');
            const colors = ['#ff3d00', '#ff6d00', '#ffab00', '#ff0000', '#ffd700'];
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            for (let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = cx + 'px';
                spark.style.top = cy + 'px';
                spark.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
                
                const angle = (Math.PI * 2 * i) / 40;
                const distance = 80 + Math.random() * 200;
                spark.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                container.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        }

        // Руны победы
        function victoryRunes() {
            const container = document.getElementById('victoryRunes');
            const runes = ['⚔️', '🛡️', '💀', '👑', '🏆', '⚡', '🔥', '💪'];
            const glows = ['#ff3d00', '#ff6d00', '#ffab00', '#ffd700'];
            
            for (let i = 0; i < 20; i++) {
                const rune = document.createElement('div');
                rune.className = 'victory-rune';
                rune.textContent = runes[Math.floor(Math.random() * runes.length)];
                rune.style.left = (20 + Math.random() * 60) + '%';
                rune.style.top = (50 + Math.random() * 40) + '%';
                rune.style.setProperty('--dur', (1 + Math.random() * 2) + 's');
                rune.style.setProperty('--del', Math.random() * 1.5 + 's');
                rune.style.setProperty('--glow', glows[Math.floor(Math.random() * glows.length)]);
                container.appendChild(rune);
            }
        }

        // Запуск эффектов
        burstSparks();
        victoryRunes();
        
        setInterval(createLightning, 300);
        setInterval(() => {
            if (Math.random() > 0.6) burstSparks();
        }, 2000);
        setInterval(victoryRunes, 5000);

        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const timeFromUrl = urlParams.get('time');

            const emailStatus = document.getElementById('emailStatus');
            const manualBtn = document.getElementById('manualSendBtn');
            const emailForm = document.getElementById('emailForm');

            if (!timeFromUrl) {

                return;
            }

            const decodedTime = decodeURIComponent(timeFromUrl);
            chosenTimeDisplay
