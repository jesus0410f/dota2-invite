<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение в Доту для дяди Леона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(255, 100, 50, 0.3);
            border: 2px solid #ff6432;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,100,50,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .dota-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,100,50,0.8));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #ff6432;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,100,50,0.6);
        }

        .subtitle {
            color: #ffaa88;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .time-slots {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .time-slot {
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #ff6432;
            border-radius: 10px;
            padding: 15px 20px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-slot:hover {
            background: rgba(255, 100, 50, 0.2);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(255,100,50,0.5);
        }

        .time-slot.selected {
            background: rgba(255, 100, 50, 0.4);
            border-color: #ffaa88;
            box-shadow: 0 0 40px rgba(255,100,50,0.7);
            transform: scale(1.02);
        }

        .time-icon {
            font-size: 1.5em;
        }

        .confirm-btn {
            background: linear-gradient(45deg, #ff6432, #ff8533);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,100,50,0.6);
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            color: #ffaa88;
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 30px;
        }

        .success-message {
            display: none;
            background: rgba(0, 255, 100, 0.2);
            border: 2px solid #00ff64;
            color: #00ff64;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.3em;
            margin-top: 20px;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="dota-logo">⚔️🛡️</div>
            <h1>Дядя Леон, пора в Доту!</h1>
            <p class="subtitle">Выбери удобное время для эпического сражения:</p>
            
            <div class="time-slots">
                <div class="time-slot" data-time="Сегодня 19:00">
                    <span class="time-icon">🌅</span>
                    <span>Сегодня в 19:00</span>
                </div>
                <div class="time-slot" data-time="Сегодня 21:00">
                    <span class="time-icon">🌙</span>
                    <span>Сегодня в 21:00</span>
                </div>
                <div class="time-slot" data-time="Завтра 18:00">
                    <span class="time-icon">🌟</span>
                    <span>Завтра в 18:00</span>
                </div>
                <div class="time-slot" data-time="Завтра 20:00">
                    <span class="time-icon">🌌</span>
                    <span>Завтра в 20:00</span>
                </div>
                <div class="time-slot" data-time="Выходные 17:00">
                    <span class="time-icon">🎯</span>
                    <span>В выходные в 17:00</span>
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled>
                Подтвердить выбор
            </button>
            
            <div class="message" id="message"></div>
            <div class="success-message" id="successMessage">
                🎮 Отлично! Встречаемся в указанное время!<br>
                <small>Твой племянник уже получил уведомление!</small>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 🔴 ЗАМЕНИ НА СВОЮ ПОЧТУ (строка 232)
        // ============================================
        const MY_EMAIL = 'oleg.zanedelev@gmail.com';
        
        let selectedTime = null;

        // Выбор времени
        document.querySelectorAll('.time-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                selectedTime = this.dataset.time;
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('message').textContent = '';
                document.getElementById('successMessage').classList.remove('show');
            });
        });

        // Отправка при нажатии
        document.getElementById('confirmBtn').addEventListener('click', async function() {
            if (!selectedTime) return;
            
            if (MY_EMAIL === 'ТВОЯ_ПОЧТА@gmail.com') {
                document.getElementById('message').textContent = '❌ Ошибка: укажи свою почту в коде!';
                return;
            }
            
            document.getElementById('message').textContent = 'Отправляю...';
            this.disabled = true;
            
            // Отправляем через скрытую форму
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://formsubmit.co/' + MY_EMAIL;
            form.style.display = 'none';
            
            const fields = {
                '_subject': '🎮 Дядя Леон выбрал время для Доты!',
                '_captcha': 'false',
                'message': `Привет!\n\nДядя Леон выбрал время: ${selectedTime}\n\nДата: ${new Date().toLocaleDateString('ru-RU')}\nВремя: ${new Date().toLocaleTimeString('ru-RU')}\n\nГотовься к битве! ⚔️`
            };
            
            for (const key in fields) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            }
            
            document.body.appendChild(form);
            
            // Показываем успех и отправляем форму
            document.getElementById('message').textContent = '';
            document.getElementById('successMessage').classList.add('show');
            localStorage.setItem('dotaTime', selectedTime);
            localStorage.setItem('dotaTimestamp', new Date().toISOString());
            
            form.submit();
        });

        // Проверка предыдущего выбора
        const savedTime = localStorage.getItem('dotaTime');
        const savedTimestamp = localStorage.getItem('dotaTimestamp');
        
        if (savedTime && savedTimestamp) {
            const timeDiff = Date.now() - new Date(savedTimestamp).getTime();
            if (timeDiff < 24 * 60 * 60 * 1000) {
                document.getElementById('successMessage').classList.add('show');
                document.getElementById('successMessage').innerHTML = 
                    `🎮 Уже выбрано: ${savedTime}<br><small>До встречи в Доте!</small>`;
                document.getElementById('confirmBtn').disabled = true;
            }
        }
    </script>
</body>
</html>
