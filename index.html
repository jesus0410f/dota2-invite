<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Приглашение в Доту для дяди Леона ⚔️</title>
    <style>
        :root {
            --dota-red: #ff3d00;
            --dota-orange: #ff6d00;
            --dota-gold: #ffab00;
            --dota-dark: #0d0d1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 15px;
            background: #050510;
            overflow: hidden;
        }

        /* Фон с молниями */
        .storm-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 61, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 171, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 109, 0, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #050510 0%, #0a0a20 50%, #0d0d1a 100%);
            animation: stormPulse 4s ease-in-out infinite;
        }

        @keyframes stormPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Молнии */
        .lightning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bolt {
            position: absolute;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.9) 0%, 
                rgba(255,200,100,0.6) 50%, 
                transparent 100%);
            width: 2px;
            animation: lightningStrike 0.1s ease-out forwards;
            opacity: 0;
            filter: blur(1px);
        }

        @keyframes lightningStrike {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Руны */
        .runes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .rune {
            position: absolute;
            font-size: 30px;
            animation: runeFloat var(--duration) linear infinite;
            animation-delay: var(--delay);
            opacity: 0;
            filter: drop-shadow(0 0 10px var(--glow-color));
        }

        @keyframes runeFloat {
            0% {
                transform: translateY(105vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-10vh) rotate(var(--spin));
                opacity: 0;
            }
        }

        .container {
            background: rgba(10, 10, 25, 0.9);
            border-radius: 25px;
            padding: 35px 25px;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 61, 0, 0.5);
            box-shadow: 
                0 0 40px rgba(255, 61, 0, 0.3),
                0 0 80px rgba(255, 109, 0, 0.15),
                0 20px 60px rgba(0, 0, 0, 0.7),
                inset 0 0 30px rgba(255, 61, 0, 0.05);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        /* Свечение границ */
        .border-glow {
            position: absolute;
            inset: -2px;
            border-radius: 27px;
            padding: 2px;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 61, 0, 0.8) 60deg,
                rgba(255, 171, 0, 0.6) 120deg,
                transparent 180deg,
                rgba(255, 61, 0, 0.4) 240deg,
                rgba(255, 109, 0, 0.6) 300deg,
                transparent 360deg
            );
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderSpin 8s linear infinite;
            pointer-events: none;
        }

        @keyframes borderSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        /* Логотип Доты */
        .dota-icon {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .shield {
            font-size: 70px;
            display: inline-block;
            animation: shieldPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 61, 0, 0.8))
                    drop-shadow(0 0 60px rgba(255, 109, 0, 0.4));
        }

        @keyframes shieldPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.05) rotate(5deg); }
        }

        /* Круги вокруг логотипа */
        .shield-rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 61, 0, 0.4);
            border-radius: 50%;
            animation: ringExpand 3s ease-out infinite;
        }

        .ring:nth-child(1) { animation-delay: 0s; }
        .ring:nth-child(2) { animation-delay: 1s; }
        .ring:nth-child(3) { animation-delay: 2s; }

        @keyframes ringExpand {
            0% {
                width: 60px;
                height: 60px;
                opacity: 0.8;
            }
            100% {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }

        h1 {
            color: #ff3d00;
            text-align: center;
            font-size: 2em;
            margin-bottom: 8px;
            text-shadow: 
                0 0 20px rgba(255, 61, 0, 0.8),
                0 0 40px rgba(255, 109, 0, 0.4),
                0 0 80px rgba(255, 61, 0, 0.2);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #ffab00;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 171, 0, 0.5);
        }

        .input-group {
            margin: 25px 0;
        }

        .input-label {
            color: #ffab00;
            font-size: 1.1em;
            margin-bottom: 12px;
            display: block;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .time-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1em;
            background: rgba(20, 20, 40, 0.9);
            border: 2px solid rgba(255, 61, 0, 0.5);
            border-radius: 15px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            font-family: inherit;
            box-shadow: 
                inset 0 2px 10px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(255, 61, 0, 0.1);
        }

        .time-input:focus {
            border-color: #ff3d00;
            box-shadow: 
                0 0 40px rgba(255, 61, 0, 0.5),
                inset 0 2px 10px rgba(0, 0, 0, 0.5);
            transform: scale(1.02);
            background: rgba(30, 30, 55, 0.95);
        }

        .time-input::placeholder {
            color: rgba(255, 171, 0, 0.3);
        }

        /* Иконка в инпуте */
        .input-rune {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            animation: runeRotate 3s linear infinite;
        }

        @keyframes runeRotate {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        .examples {
            color: rgba(255, 171, 0, 0.6);
            font-size: 0.85em;
            margin-top: 12px;
            text-align: center;
            line-height: 1.5;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ff3d00, #ff6d00, #ff3d00);
            background-size: 200% 200%;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 900;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 30px rgba(255, 61, 0, 0.5),
                0 0 60px rgba(255, 109, 0, 0.2);
            transition: all 0.3s ease;
            animation: btnBgShift 3s ease infinite;
        }

        @keyframes btnBgShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .confirm-btn:not(:disabled) {
            animation: btnGlow 2s ease-in-out infinite, btnBgShift 3s ease infinite;
        }

        @keyframes btnGlow {
            0%, 100% { 
                box-shadow: 0 8px 30px rgba(255, 61, 0, 0.5), 0 0 60px rgba(255, 109, 0, 0.2);
            }
            50% { 
                box-shadow: 0 8px 50px rgba(255, 61, 0, 0.8), 0 0 100px rgba(255, 109, 0, 0.4);
            }
        }

        /* Эффект трещин при клике */
        .confirm-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s;
        }

        .confirm-btn:active::after {
            width: 400px;
            height: 400px;
        }

        .confirm-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .confirm-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            animation: none;
            box-shadow: none;
            filter: grayscale(60%);
        }

        .decor {
            text-align: center;
            font-size: 24px;
            margin-top: 20px;
            opacity: 0.5;
            letter-spacing: 10px;
        }

        .decor span {
            display: inline-block;
            animation: decorFloat 3s ease-in-out infinite;
        }
        .decor span:nth-child(2) { animation-delay: 0.5s; }
        .decor span:nth-child(3) { animation-delay: 1s; }

        @keyframes decorFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="storm-bg"></div>
    <div class="lightning" id="lightning"></div>
    <div class="runes" id="runes"></div>

    <div class="container">
        <div class="border-glow"></div>
        <div class="content">
            <div class="dota-icon">
                <div class="shield-rings">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <div class="shield">⚔️</div>
            </div>
            <h1>Дядя Леон, в бой!</h1>
            <p class="subtitle">Выбери время для эпичной катки 🎯</p>
            
            <div class="input-group">
                <label class="input-label" for="timeInput">⚡ Время битвы:</label>
                <div class="input-wrapper">
                    <span class="input-rune">🔮</span>
                    <input 
                        type="text" 
                        class="time-input" 
                        id="timeInput" 
                        placeholder="Сегодня в 20:00"
                        autocomplete="off"
                        style="padding-left: 45px;"
                    >
                </div>
                <div class="examples">
                    💀 "Сегодня в 19:00" • "Завтра вечером" • "В выходные днём"
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled>
                ⚔️ В БОЙ ⚔️
            </button>

            <div class="decor">
                <span>🛡️</span>
                <span>⚡</span>
                <span>🗡️</span>
            </div>
        </div>
    </div>

    <script>
        // Молнии
        function createLightning() {
            const container = document.getElementById('lightning');
            const bolt = document.createElement('div');
            bolt.className = 'bolt';
            bolt.style.left = Math.random() * 100 + '%';
            bolt.style.top = Math.random() * 60 + '%';
            bolt.style.height = (Math.random() * 150 + 50) + 'px';
            bolt.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
            container.appendChild(bolt);
            
            setTimeout(() => bolt.remove(), 150);
        }

        setInterval(() => {
            if (Math.random() > 0.7) {
                createLightning();
                if (Math.random() > 0.5) {
                    setTimeout(createLightning, 50);
                }
            }
        }, 200);

        // Руны
        function createRunes() {
            const runes = ['🔥', '⚡', '💀', '🩸', '👊', '💥', '🎯', '⚔️'];
            const colors = ['#ff3d00', '#ff6d00', '#ffab00', '#ff0000'];
            const container = document.getElementById('runes');
            
            for (let i = 0; i < 12; i++) {
                const rune = document.createElement('div');
                rune.className = 'rune';
                rune.textContent = runes[Math.floor(Math.random() * runes.length)];
                rune.style.left = Math.random() * 100 + '%';
                rune.style.setProperty('--duration', (Math.random() * 8 + 6) + 's');
                rune.style.setProperty('--delay', Math.random() * 8 + 's');
                rune.style.setProperty('--spin', (Math.random() * 360 - 180) + 'deg');
                rune.style.setProperty('--glow-color', colors[Math.floor(Math.random() * colors.length)]);
                container.appendChild(rune);
            }
        }

        createRunes();

        // Логика формы
        (function() {
            const timeInput = document.getElementById('timeInput');
            const confirmBtn = document.getElementById('confirmBtn');

            function updateButton() {
                const hasValue = timeInput.value.trim().length > 0;
                confirmBtn.disabled = !hasValue;
            }

            function goToNext() {
                const time = timeInput.value.trim();
                if (!time) return;
                window.location.href = `meeting-dota.html?time=${encodeURIComponent(time)}`;
            }

            timeInput.addEventListener('input', updateButton);
            timeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !confirmBtn.disabled) {
                    e.preventDefault();
                    goToNext();
                }
            });
            confirmBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!confirmBtn.disabled) goToNext();
            });

            window.addEventListener('load', () => {
                setTimeout(() => timeInput.focus(), 500);
            });
        })();
    </script>
</body>
</html>
