<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение в Доту для дяди Леона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(255, 100, 50, 0.3);
            border: 2px solid #ff6432;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,100,50,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .dota-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,100,50,0.8));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #ff6432;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,100,50,0.6);
        }

        .subtitle {
            color: #ffaa88;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .time-slots {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .time-slot {
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #ff6432;
            border-radius: 10px;
            padding: 15px 20px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-slot:hover {
            background: rgba(255, 100, 50, 0.2);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(255,100,50,0.5);
        }

        .time-slot.selected {
            background: rgba(255, 100, 50, 0.4);
            border-color: #ffaa88;
            box-shadow: 0 0 40px rgba(255,100,50,0.7);
            transform: scale(1.02);
        }

        .time-icon {
            font-size: 1.5em;
        }

        .confirm-btn {
            background: linear-gradient(45deg, #ff6432, #ff8533);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,100,50,0.6);
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            color: #ffaa88;
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 30px;
            transition: all 0.3s ease;
        }

        .success-message {
            display: none;
            background: rgba(0, 255, 100, 0.2);
            border: 2px solid #00ff64;
            color: #00ff64;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.3em;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="dota-logo">⚔️🛡️</div>
            <h1>Дядя Леон, пора в Доту!</h1>
            <p class="subtitle">Выбери удобное время для эпического сражения:</p>
            
            <div class="time-slots" id="timeSlots">
                <div class="time-slot" data-time="Сегодня 19:00">
                    <span class="time-icon">🌅</span>
                    <span>Сегодня в 19:00</span>
                </div>
                <div class="time-slot" data-time="Сегодня 21:00">
                    <span class="time-icon">🌙</span>
                    <span>Сегодня в 21:00</span>
                </div>
                <div class="time-slot" data-time="Завтра 18:00">
                    <span class="time-icon">🌟</span>
                    <span>Завтра в 18:00</span>
                </div>
                <div class="time-slot" data-time="Завтра 20:00">
                    <span class="time-icon">🌌</span>
                    <span>Завтра в 20:00</span>
                </div>
                <div class="time-slot" data-time="Выходные 17:00">
                    <span class="time-icon">🎯</span>
                    <span>В выходные в 17:00</span>
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled>
                Подтвердить выбор
            </button>
            
            <div class="message" id="message"></div>
            <div class="success-message" id="successMessage">
                🎮 Отлично! Встречаемся в указанное время!<br>
                <small>Проверь почту — письмо уже должно быть там!</small>
            </div>
        </div>
    </div>

    <!-- Подключаем EmailJS библиотеку -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        // ============================================
        // oleg.zanedelev@gmail.com
        // ============================================
        const MY_EMAIL = 'oleg.zanedelev@gmail.com'; // ← ЗАМЕНИ ЭТО!
        
        // Настройки EmailJS (регистрация за 2 минуты на emailjs.com)
        const EMAILJS_SERVICE_ID = 'service_default'; // Замени на свой
        const EMAILJS_TEMPLATE_ID = 'template_default'; // Замени на свой
        const EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY'; // Замени на свой
        
        let selectedTime = null;

        // Инициализация EmailJS
        emailjs.init(EMAILJS_PUBLIC_KEY);

        // Обработчики выбора времени
        document.querySelectorAll('.time-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                selectedTime = this.dataset.time;
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('message').textContent = '';
                document.getElementById('successMessage').classList.remove('show');
            });
        });

        // Обработчик подтверждения
        document.getElementById('confirmBtn').addEventListener('click', async function() {
            if (!selectedTime) return;
            
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = 'Отправляю уведомление...';
            this.disabled = true;
            
            // Пробуем отправить через EmailJS
            let sent = await sendViaEmailJS(selectedTime);
            
            // Если не получилось — пробуем FormSubmit
            if (!sent) {
                sent = await sendViaFormSubmit(selectedTime);
            }
            
            if (sent) {
                messageDiv.textContent = '';
                document.getElementById('successMessage').classList.add('show');
                localStorage.setItem('dotaTime', selectedTime);
                localStorage.setItem('dotaTimestamp', new Date().toISOString());
            } else {
                messageDiv.textContent = '❌ Не удалось отправить. Проверь настройки почты в коде или открой консоль (F12)';
                this.disabled = false;
            }
        });

        // Способ 1: EmailJS
        async function sendViaEmailJS(time) {
            if (!EMAILJS_PUBLIC_KEY || EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
                console.log('⚠️ EmailJS не настроен');
                return false;
            }
            
            try {
                console.log('📧 Пробую отправить через EmailJS...');
                
                const templateParams = {
                    to_email: MY_EMAIL,
                    to_name: 'Племянник',
                    from_name: 'Дядя Леон',
                    time: time,
                    date: new Date().toLocaleDateString('ru-RU'),
                    message: `Дядя Леон выбрал время: ${time}`
                };
                
                const response = await emailjs.send(
                    EMAILJS_SERVICE_ID,
                    EMAILJS_TEMPLATE_ID,
                    templateParams
                );
                
                console.log('✅ Письмо отправлено через EmailJS!', response);
                return true;
            } catch (error) {
                console.error('❌ Ошибка EmailJS:', error);
                return false;
            }
        }

        // Способ 2: FormSubmit
        async function sendViaFormSubmit(time) {
            if (MY_EMAIL === 'ТВОЯ_ПОЧТА@gmail.com') {
                console.log('⚠️ Почта не указана');
                return false;
            }
            
            try {
                console.log('📧 Пробую отправить через FormSubmit...');
                
                const formData = new FormData();
                formData.append('email', MY_EMAIL);
                formData.append('_subject', '🎮 Дядя Леон выбрал время для Доты!');
                formData.append('message', 
                    `Привет!\n\n` +
                    `Дядя Леон выбрал время: ${time}\n` +
                    `Дата выбора: ${new Date().toLocaleDateString('ru-RU')}\n` +
                    `Время выбора: ${new Date().toLocaleTimeString('ru-RU')}\n\n` +
                    `Готовься к битве! ⚔️`
                );
                formData.append('_captcha', 'false');
                formData.append('_template', 'table');
                
                const response = await fetch('https://formsubmit.co/ajax/' + MY_EMAIL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success === 'true' || result.success === true) {
                    console.log('✅ Письмо отправлено через FormSubmit!');
                    console.log('📬 Проверь папку "Входящие" и "Спам"');
                    return true;
                } else {
                    console.log('⚠️ FormSubmit ответил:', result);
                    return false;
                }
            } catch (error) {
                console.error('❌ Ошибка FormSubmit:', error);
                return false;
            }
        }

        // Проверка при загрузке
        window.addEventListener('load', function() {
            const savedTime = localStorage.getItem('dotaTime');
            const savedTimestamp = localStorage.getItem('dotaTimestamp');
            
            if (savedTime && savedTimestamp) {
                const timeDiff = Date.now() - new Date(savedTimestamp).getTime();
                if (timeDiff < 24 * 60 * 60 * 1000) {
                    document.getElementById('successMessage').classList.add('show');
                    document.getElementById('successMessage').innerHTML = 
                        `🎮 Уже выбрано: ${savedTime}<br><small>До встречи в Доте!</small>`;
                    document.getElementById('confirmBtn').disabled = true;
                }
            }
            
            // Диагностика в консоли
            console.log('=== ДИАГНОСТИКА ===');
            console.log('📧 Почта для уведомлений:', MY_EMAIL || 'НЕ УКАЗАНА!');
            console.log('🔑 EmailJS ключ:', EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY' ? 'Настроен' : 'НЕ НАСТРОЕН');
            console.log('===================');
            
            if (MY_EMAIL === 'ТВОЯ_ПОЧТА@gmail.com') {
                console.warn('⚠️ Ты забыл указать свою почту в строке 234!');
            }
        });
    </script>
</body>
</html>
