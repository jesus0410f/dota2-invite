<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дядя Леон, в Доту! ⚔️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            background: #0a0a0a;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 60%, rgba(200,30,20,0.25) 0%, transparent 60%),
                radial-gradient(circle at 80% 30%, rgba(255,80,20,0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(180,20,10,0.2) 0%, transparent 50%),
                #0a0a0a;
            z-index: 0;
        }
        .grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,60,20,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,60,20,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }
        .container {
            background: #111;
            border-radius: 4px;
            padding: 35px 30px;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 2px solid #2a0808;
            box-shadow: 
                0 0 0 3px #1a1a1a,
                0 0 0 6px #1a0505,
                0 0 0 7px #8b1a10,
                0 20px 50px rgba(0,0,0,0.7),
                0 0 80px rgba(200,30,20,0.3);
        }
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #ff4020;
            border-style: solid;
            z-index: 2;
        }
        .corner-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .corner-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a0808;
        }
        .logo {
            font-size: 45px;
            filter: drop-shadow(0 0 15px #ff4020);
            animation: logoPulse 2s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,100% { filter: drop-shadow(0 0 15px #ff4020); }
            50% { filter: drop-shadow(0 0 30px #ff6040); }
        }
        .title h1 {
            color: #ddd;
            font-size: 1.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.3;
        }
        .title h1 .red {
            color: #ff4020;
            text-shadow: 0 0 20px rgba(255,64,32,0.6);
        }
        .title .sub {
            color: #777;
            font-size: 0.7em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .card {
            background: #0d0d0d;
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 25px;
        }
        .card-label {
            color: #999;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .card-label span {
            color: #ff4020;
        }
        .time-input {
            width: 100%;
            padding: 15px;
            font-size: 1em;
            background: #080808;
            border: 1px solid #2a0808;
            color: #fff;
            outline: none;
            text-align: center;
            font-family: inherit;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .time-input:focus {
            border-color: #ff4020;
            box-shadow: 0 0 25px rgba(255,64,32,0.3), inset 0 0 10px rgba(255,64,32,0.05);
        }
        .time-input::placeholder {
            color: #444;
        }
        .hint {
            color: #666;
            font-size: 0.75em;
            margin-top: 10px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: none;
            cursor: pointer;
            background: linear-gradient(180deg, #b02018 0%, #801010 100%);
            color: #fff;
            border-radius: 2px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #ff4020;
            box-shadow: 0 5px 20px rgba(200,20,10,0.4);
        }
        .btn:not(:disabled):hover {
            background: linear-gradient(180deg, #d03020 0%, #a01818 100%);
            box-shadow: 0 5px 30px rgba(255,64,32,0.6);
        }
        .btn:not(:disabled):active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            filter: grayscale(0.6);
        }
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .footer-icons {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            letter-spacing: 8px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid"></div>

    <div class="container">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="header">
            <div class="logo">⚔️</div>
            <div class="title">
                <h1>Дядя <span class="red">Леон</span>,</h1>
                <div class="sub">приглашение в дота 2</div>
            </div>
        </div>

        <div class="card">
            <div class="card-label"><span>⚡</span> Выбери время битвы</div>
            <input 
                type="text" 
                class="time-input" 
                id="timeInput" 
                placeholder="Сегодня в 20:00"
                autocomplete="off"
            >
            <div class="hint">
                💀 Сегодня в 19:00 &nbsp;•&nbsp; Завтра вечером &nbsp;•&nbsp; В субботу днём
            </div>
        </div>

        <button class="btn" id="confirmBtn" disabled>⚔️ Принять бой</button>

        <div class="footer-icons">🛡️ ⚡ 🗡️</div>
    </div>

    <script>
        const timeInput = document.getElementById('timeInput');
        const confirmBtn = document.getElementById('confirmBtn');

        timeInput.addEventListener('input', () => {
            confirmBtn.disabled = !timeInput.value.trim();
        });

        function go() {
            const time = timeInput.value.trim();
            if (!time) return;
            window.location.href = 'meeting-dota.html?time=' + encodeURIComponent(time);
        }

        timeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !confirmBtn.disabled) { e.preventDefault(); go(); }
        });

        confirmBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (!confirmBtn.disabled) go();
        });

        window.addEventListener('load', () => setTimeout(() => timeInput.focus(), 400));
    </script>
</body>
</html>
