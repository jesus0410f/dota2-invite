<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение в Доту для дяди Леона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(255, 100, 50, 0.3);
            border: 2px solid #ff6432;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,100,50,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .dota-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,100,50,0.8));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #ff6432;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,100,50,0.6);
        }

        .subtitle {
            color: #ffaa88;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .input-group {
            margin: 30px 0;
        }

        .input-label {
            color: #ffaa88;
            font-size: 1.3em;
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }

        .time-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #ff6432;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .time-input:focus {
            border-color: #ffaa88;
            box-shadow: 0 0 30px rgba(255,100,50,0.5);
            background: rgba(40, 40, 60, 0.9);
        }

        .time-input::placeholder {
            color: rgba(255, 170, 136, 0.5);
        }

        .examples {
            color: #ffaa88;
            font-size: 0.9em;
            margin-top: 10px;
            opacity: 0.8;
            text-align: center;
        }

        .confirm-btn {
            background: linear-gradient(45deg, #ff6432, #ff8533);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,100,50,0.6);
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="dota-logo">⚔️🛡️</div>
            <h1>Приглашаю тебя в Доту!</h1>
            <p class="subtitle">Выбери удобное время:</p>
            
            <div class="input-group">
                <label class="input-label">🕐 Твоё время:</label>
                <input 
                    type="text" 
                    class="time-input" 
                    id="timeInput" 
                    placeholder="Например: Завтра в 19:00"
                    autocomplete="off"
                >
                <div class="examples">
                    💡 Например: "Сегодня в 20:00", "Завтра после обеда", "В субботу вечером"
                </div>
            </div>

            <a class="confirm-btn" id="confirmBtn" disabled>
                Подтвердить время
            </a>
        </div>
    </div>

    <script>
        const timeInput = document.getElementById('timeInput');
        const confirmBtn = document.getElementById('confirmBtn');

        // Активируем кнопку когда что-то введено
        timeInput.addEventListener('input', function() {
            if (this.value.trim().length > 0) {
                confirmBtn.disabled = false;
                confirmBtn.style.opacity = '1';
                confirmBtn.style.cursor = 'pointer';
            } else {
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = '0.5';
                confirmBtn.style.cursor = 'not-allowed';
            }
        });

        // Отправка по Enter
        timeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !confirmBtn.disabled) {
                goToNextPage();
            }
        });

        // Переход на следующую страницу
        confirmBtn.addEventListener('click', function(e) {
            if (confirmBtn.disabled) {
                e.preventDefault();
                return;
            }
            goToNextPage();
        });

        function goToNextPage() {
            const selectedTime = timeInput.value.trim();
            if (!selectedTime) return;
            
            // Кодируем время для URL
            const encodedTime = encodeURIComponent(selectedTime);
            // Переходим на страницу 2
            window.location.href = 'meeting.html?time=' + encodedTime;
        }
    </script>
</body>
</html>
