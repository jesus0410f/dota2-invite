<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение в Доту для дяди Леона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(255, 100, 50, 0.3);
            border: 2px solid #ff6432;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,100,50,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .dota-logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,100,50,0.8));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #ff6432;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,100,50,0.6);
        }

        .subtitle {
            color: #ffaa88;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .time-slots {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .time-slot {
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #ff6432;
            border-radius: 10px;
            padding: 15px 20px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-slot:hover {
            background: rgba(255, 100, 50, 0.2);
            transform: translateX(10px);
            box-shadow: 0 0 30px rgba(255,100,50,0.5);
        }

        .time-slot.selected {
            background: rgba(255, 100, 50, 0.4);
            border-color: #ffaa88;
            box-shadow: 0 0 40px rgba(255,100,50,0.7);
            transform: scale(1.02);
        }

        .time-icon {
            font-size: 1.5em;
        }

        .confirm-btn {
            background: linear-gradient(45deg, #ff6432, #ff8533);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,100,50,0.6);
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            text-align: center;
            color: #ffaa88;
            margin-top: 20px;
            font-size: 1.1em;
            min-height: 30px;
            transition: all 0.3s ease;
        }

        .success-message {
            display: none;
            background: rgba(0, 255, 100, 0.2);
            border: 2px solid #00ff64;
            color: #00ff64;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.3em;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="dota-logo">⚔️🛡️</div>
            <h1>Дядя Леон, пора в Доту!</h1>
            <p class="subtitle">Выбери удобное время для эпического сражения:</p>
            
            <div class="time-slots" id="timeSlots">
                <div class="time-slot" data-time="Сегодня 19:00">
                    <span class="time-icon">🌅</span>
                    <span>Сегодня в 19:00</span>
                </div>
                <div class="time-slot" data-time="Сегодня 21:00">
                    <span class="time-icon">🌙</span>
                    <span>Сегодня в 21:00</span>
                </div>
                <div class="time-slot" data-time="Завтра 18:00">
                    <span class="time-icon">🌟</span>
                    <span>Завтра в 18:00</span>
                </div>
                <div class="time-slot" data-time="Завтра 20:00">
                    <span class="time-icon">🌌</span>
                    <span>Завтра в 20:00</span>
                </div>
                <div class="time-slot" data-time="Выходные 17:00">
                    <span class="time-icon">🎯</span>
                    <span>В выходные в 17:00</span>
                </div>
            </div>

            <button class="confirm-btn" id="confirmBtn" disabled>
                Подтвердить выбор
            </button>
            
            <div class="message" id="message"></div>
            <div class="success-message" id="successMessage">
                🎮 Отлично! Встречаемся в указанное время!<br>
                <small>Уведомление отправлено на почту!</small>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ВСТАВЬ СЮДА СВОЮ ПОЧТУ!
        // ============================================
        const MY_EMAIL = 'oleg.zanedelev@gmail.com'; // ← ЗАМЕНИ ЭТО!
        
        let selectedTime = null;

        // Обработчики выбора времени
        document.querySelectorAll('.time-slot').forEach(slot => {
            slot.addEventListener('click', function() {
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                selectedTime = this.dataset.time;
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('message').textContent = '';
                document.getElementById('successMessage').classList.remove('show');
            });
        });

        // Обработчик подтверждения
        document.getElementById('confirmBtn').addEventListener('click', async function() {
            if (!selectedTime) return;
            
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<span class="loading-spinner"></span>Отправляю уведомление на почту...';
            this.disabled = true;
            
            // Отправляем уведомление на почту
            const sent = await sendEmailNotification(selectedTime);
            
            if (sent) {
                messageDiv.textContent = '';
                document.getElementById('successMessage').classList.add('show');
                // Сохраняем в localStorage
                localStorage.setItem('dotaTime', selectedTime);
                localStorage.setItem('dotaTimestamp', new Date().toISOString());
            } else {
                messageDiv.textContent = 'Не удалось отправить письмо. Проверь почту в коде!';
                this.disabled = false;
            }
        });

        // Функция отправки email через несколько сервисов
        async function sendEmailNotification(time) {
            if (MY_EMAIL === 'ТВОЯ_ПОЧТА@gmail.com') {
                alert('Эй! Ты забыл вставить свою почту в коде! Найди строчку "const MY_EMAIL" и замени на свою почту!');
                return false;
            }

            const subject = '🎮 Дядя Леон выбрал время для Доты!';
            const message = `
                Привет! 👋
                
                Дядя Леон только что выбрал время для игры в Доту:
                
                🕐 ${time}
                📅 ${new Date().toLocaleDateString('ru-RU')}
                ⏰ ${new Date().toLocaleTimeString('ru-RU')}
                
                Готовься к битве! ⚔️
                
                ---
                Отправлено автоматически с сайта-приглашения
            `;

            // Пробуем несколько сервисов по очереди
            let success = await tryFormSubmit(MY_EMAIL, subject, message);
            if (success) return true;
            
            success = await tryEmailJS(MY_EMAIL, subject, message);
            if (success) return true;
            
            // Если ничего не сработало, сохраняем локально
            saveToLocal(time, message);
            alert('Письмо не удалось отправить автоматически, но выбор сохранён! Проверь консоль (F12) для деталей.');
            return false;
        }

        // Способ 1: FormSubmit (бесплатный, не требует регистрации)
        async function tryFormSubmit(email, subject, message) {
            try {
                console.log('Пробую отправить через FormSubmit...');
                
                const formData = new FormData();
                formData.append('email', email);
                formData.append('message', message);
                formData.append('_subject', subject);
                formData.append('_captcha', 'false');
                formData.append('_template', 'table');
                
                const response = await fetch('https://formsubmit.co/ajax/' + email, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    console.log('✅ Письмо отправлено через FormSubmit!');
                    console.log('📧 Проверь почту (и папку Спам тоже)');
                    return true;
                }
            } catch (error) {
                console.log('FormSubmit не сработал:', error);
            }
            return false;
        }

        // Способ 2: EmailJS (нужна регистрация, но надёжнее)
        async function tryEmailJS(email, subject, message) {
            // Если у тебя есть аккаунт EmailJS, вставь свои ключи:
            const EMAILJS_SERVICE_ID = ''; // Вставь свой Service ID
            const EMAILJS_TEMPLATE_ID = ''; // Вставь свой Template ID
            const EMAILJS_USER_ID = ''; // Вставь свой User ID
            
            if (!EMAILJS_SERVICE_ID) {
                console.log('EmailJS не настроен, пропускаю...');
                return false;
            }
            
            try {
                console.log('Пробую отправить через EmailJS...');
                
                const templateParams = {
                    to_email: email,
                    subject: subject,
                    message: message,
                    time: new Date().toLocaleString('ru-RU')
                };
                
                const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        service_id: EMAILJS_SERVICE_ID,
                        template_id: EMAILJS_TEMPLATE_ID,
                        user_id: EMAILJS_USER_ID,
                        template_params: templateParams,
                    }),
                });
                
                if (response.ok) {
                    console.log('✅ Письмо отправлено через EmailJS!');
                    return true;
                }
            } catch (error) {
                console.log('EmailJS не сработал:', error);
            }
            return false;
        }

        // Локальное сохранение (запасной вариант)
        function saveToLocal(time, message) {
            const selections = JSON.parse(localStorage.getItem('dotaSelections') || '[]');
            selections.push({
                time: time,
                message: message,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('dotaSelections', JSON.stringify(selections));
            
            console.log('💾 Выбор сохранён локально:');
            console.log('🕐 Время:', time);
            console.log('📋 Все выборы:', selections);
            console.log('📧 Для просмотра открой консоль (F12)');
        }

        // Проверка предыдущих выборов при загрузке
        window.addEventListener('load', function() {
            // Проверяем, не выбирал ли дядя Леон время ранее
            const savedTime = localStorage.getItem('dotaTime');
            const savedTimestamp = localStorage.getItem('dotaTimestamp');
            
            if (savedTime && savedTimestamp) {
                const timeDiff = Date.now() - new Date(savedTimestamp).getTime();
                // Если прошло меньше 24 часов
                if (timeDiff < 24 * 60 * 60 * 1000) {
                    document.getElementById('successMessage').classList.add('show');
                    document.getElementById('successMessage').innerHTML = 
                        `🎮 Уже выбрано: ${savedTime}<br><small>До встречи в Доте!</small>`;
                    document.getElementById('confirmBtn').disabled = true;
                } else {
                    // Очищаем старые данные
                    localStorage.removeItem('dotaTime');
                    localStorage.removeItem('dotaTimestamp');
                }
            }
            
            // Показываем сохранённые выборы в консоли
            const allSelections = JSON.parse(localStorage.getItem('dotaSelections') || '[]');
            if (allSelections.length > 0) {
                console.log('📋 История выборов дяди Леона:');
                allSelections.forEach((sel, i) => {
                    console.log(`${i + 1}. ${sel.time} (${new Date(sel.timestamp).toLocaleString('ru-RU')})`);
                });
            }
        });

        // Подсказка в консоли
        console.log(`
        🎮 Сайт приглашения в Доту готов!
        📧 Уведомления будут приходить на: ${MY_EMAIL}
        
        💡 Как это работает:
        1. Дядя Леон выбирает время
        2. Нажимает "Подтвердить"
        3. Тебе приходит письмо на почту!
        
        ⚠️ Если письма не приходят:
        - Проверь папку "Спам"
        - Убедись, что почта в коде правильная
        - При первом использовании FormSubmit нужно подтвердить email
        `);
    </script>
</body>
</html>
